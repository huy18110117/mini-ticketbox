
services:
  postgres:
    image: postgres:16
    container_name: mini-ticketbox-postgres
    restart: always
    environment:
      POSTGRES_DB: miniticketbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mini-ticketbox-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres-data: